<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Landing Page UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
    font-family: 'Segoe UI', sans-serif;
}

.main-box{
    background: linear-gradient(135deg, #0b0fa8, #1a1fd1);
    border-radius: 30px;
    padding: 50px 60px;
    margin: 20px auto;
    max-width: 1200px;
    color: #fff;
}

/* Navbar */
.navbar-brand{
    font-weight: 600;
    color: #fff !important;
}

.nav-link{
    color: #cfd2ff !important;
    font-size: 15px;
}

.btn-purchase{
    background: #e45858;
    border-radius: 30px;
    padding: 8px 22px;
    color: #fff;
    border: none;
}

/* Left Content */
.hero-title{
    font-size: 52px;
    font-weight: 700;
    margin-bottom: 20px;
}

.hero-text{
    color: #dcdcdc;
    font-size: 16px;
    max-width: 420px;
}

.btn-learn{
    background:#e45858;
    color:#fff;
    border-radius:30px;
    padding:10px 26px;
    margin-top:20px;
    border:none;
}

/* Sign Up Card */
.signup-card{
    background:#fff;
    border-radius:30px;
    padding:35px;
    color:#000;
    max-width:420px;
    width:100%;
}

.signup-card h4{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

.form-control{
    border-radius:25px;
    padding:12px 20px;
    background:#f1eded;
    border:none;
    margin-bottom:15px;
}

.form-check-label{
    font-size:13px;
}

.btn-signin{
    background:#3b3fd4;
    color:#fff;
    border-radius:25px;
    padding:12px;
    width:100%;
    border:none;
    margin-top:10px;
}

.divider{
    text-align:center;
    color:#999;
    margin:15px 0;
}

.btn-google{
    background:#6a6cf3;
    color:#fff;
    border-radius:25px;
    padding:12px;
    width:100%;
    border:none;
}

.login-text{
    text-align:center;
    font-size:13px;
    margin-top:12px;
}

.login-text a{
    color:#4caf50;
    text-decoration:none;
}
/* OR Divider */
.or-divider hr{
    border-top:2px solid #000;
}
/* 🔹 Responsive Tweaks */
@media (max-width: 768px){
    .main-box{
        padding: 30px 20px;
        border-radius: 20px;
    }

    .hero-title{
        font-size: 36px;
        text-align: center;
    }

    .hero-text{
        text-align: center;
        margin: auto;
    }

    .btn-learn{
        display: block;
        margin: 20px auto 0;
    }
}
</style>
</head>

<body>

<div class="main-box">

    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <a class="navbar-brand" href="#">Chandana Groups</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navMenu">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="#">OVERVIEW</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Price</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Feedback</a></li>
                <li class="nav-item ms-lg-3">
                    <button class="btn btn-purchase">Purchase</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Content -->
    <div class="row align-items-center g-5">

        <!-- Left -->
        <div class="col-lg-6 text-center text-lg-start">
            <h1 class="hero-title">Generate Awesome<br>Web Pages</h1>
            <p class="hero-text">
                The most important part of the Startup is the samples.
                The samples form a set of 25 usable pages you can use as
                is or you can add new blocks
            </p>
            <button class="btn btn-learn">Learn More</button>
        </div>

        <!-- Right -->
        <div class="col-lg-6 d-flex justify-content-center">
            <div class="signup-card">
                <h4>Sign Up Now</h4>

                <input type="email" class="form-control" placeholder="Your Email">
                <input type="password" class="form-control" placeholder="Your Password">

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">
                        I agree to the terms of services
                    </label>
                </div>

                <button class="btn btn-signin">Sign In</button>

                <!-- OR Divider -->
                <div class="d-flex align-items-center or-divider my-3">
                    <hr class="flex-grow-1">
                    <span class="px-2 text-muted">or</span>
                    <hr class="flex-grow-1">
                </div>

                <button class="btn btn-google">Login via Google</button>

                <div class="login-text">
                    Do you have an Account? <a href="#">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
