<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Landing Page UI</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
    font-family: 'Segoe UI', sans-serif;
}

.main-box{
    background: linear-gradient(135deg,#1a1fa3,#1518a6);
    border-radius:15px;
    padding:40px;
    color:#fff;
    max-width:1000px;
    margin:40px auto;
}

.nav-link{
    color:#fff !important;
    font-weight:500;
}

.nav-link.active{
    color:#cfd2ff !important;
}

.btn-pink{
    background:#ff6b6b;
    color:#fff;
    border-radius:25px;
    padding:6px 18px;
    border:none;
}

.hero h1{
    font-size:48px;
    font-weight:700;
}

.hero p{
    color:#d6d8ff;
    line-height:1.6;
}

.learn-btn{
    background:#ff6b6b;
    color:#fff;
    border-radius:25px;
    padding:6px 18px;
    border:none;
}

.form-card{
    background:#fff;
    border-radius:25px;
    padding:40px;
    color:#333;
}

.form-control{
    background:#f1eded;
    border-radius:25px;
    padding:12px 18px;
    border:none;
}

.sign-btn{
    background:#2d2fc5;
    color:#fff;
    border-radius:25px;
    padding:10px;
    border:none;
}

.google-btn{
    background:#5f60f5;
    color:#fff;
    border-radius:25px;
    padding:10px;
    border:none;
}
/* OR Divider */
.or-divider hr{
    border-top:2px solid #000;
}
</style>
</head>

<body>

<div class="main-box">

    <!-- Navbar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Chandana Groups</h4>
        <div class="d-flex align-items-center gap-4">
            <a class="nav-link active" href="#">OVERVIEW</a>
            <a class="nav-link" href="#">Price</a>
            <a class="nav-link" href="#">Blog</a>
            <a class="nav-link" href="#">Feedback</a>
            <button class="btn-pink">Purchase</button>
        </div>
    </div>

    <!-- Content -->
    <div class="row align-items-center gx-1">
        
        <!-- Left Section -->
        <div class="col-md-6 hero">
            <h1>Generate Awesome<br>Web Pages</h1>
            <p class="mt-4">
                The most important part of the Startup is<br> the samples.
                The samples form a set of<br> 25 usable pages you can use as is
                or you<br> can add new blocks.
            </p>
            <button class="learn-btn mt-3">Learn More</button>
        </div>

        <!-- Right Section -->
        <div class="col-md-5 offset-md-1">
            <div class="form-card shadow">
                <h4 class="text-center mb-4">Sign Up Now</h4>

                <input type="email" class="form-control mb-3" placeholder="Your Email">
                <input type="password" class="form-control mb-3" placeholder="Your Password">

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label small">
                        I agree to the terms of services
                    </label>
                </div>

                <button class="sign-btn w-100 mb-3">Sign In</button>
                <!-- OR Divider -->
                <div class="d-flex align-items-center or-divider my-3">
                    <hr class="flex-grow-1">
                    <span class="px-2 text-muted">or</span>
                    <hr class="flex-grow-1">
                </div>

                <button class="google-btn w-100">Login via Google</button>

                <p class="text-center small mt-3">
                    Do you have an Account?
                    <a href="#" class="text-success text-decoration-none">Sign In</a>
                </p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
